<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValuesLTTD ┆ Trade Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Цвета сторон как на скриншоте */
        .side-your { border: 2px solid #00a2ff; box-shadow: 0 0 15px rgba(0, 162, 255, 0.2); }
        .side-their { border: 2px solid #ff0044; box-shadow: 0 0 15px rgba(255, 0, 68, 0.2); }
        
        /* Кнопки Навигации */
        .nav-link { @apply px-4 py-2 text-sm font-bold uppercase tracking-wider transition-all border-b-2 border-transparent; }
        .nav-link.active { @apply border-blue-500 text-blue-400; }
        .nav-link:not(.active) { @apply text-slate-500 hover:text-slate-300; }

        /* Поля ввода для гемов */
        .gem-input { @apply bg-slate-900/50 border border-slate-700 rounded-lg p-2 text-center w-full focus:outline-none focus:border-blue-500 font-mono text-lg; }
    </style>
</head>
<body x-data="portalApp()">

    <nav class="bg-black/50 border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="font-black text-xl tracking-tighter">VALUES<span class="text-blue-500">LTTD</span></div>
            <div class="hidden md:flex gap-6">
                <a href="#" @click.prevent="tab = 'values'" class="nav-link" :class="tab == 'values' && 'active'">Main Page</a>
                <a href="#" @click.prevent="tab = 'calc'" class="nav-link" :class="tab == 'calc' && 'active'">W/F/L Calculator</a>
                <a href="#" @click.prevent="tab = 'staff'" class="nav-link" :class="tab == 'staff' && 'active'">Staff & Partners</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 pt-10">

        <div x-show="tab == 'calc'" x-transition>
            <h1 class="text-center text-3xl font-black mb-10 tracking-widest text-blue-400 uppercase">LTTD Trade Calculator</h1>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="glass p-6 rounded-3xl side-your relative">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-blue-400 font-black uppercase tracking-tighter">Your Offer</h2>
                        <button @click="resetSide('my')" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded hover:bg-red-600 hover:text-white transition-all uppercase font-bold">Clear</button>
                    </div>
                    
                    <div class="h-48 bg-black/40 rounded-2xl mb-6 border border-white/5 p-4 overflow-y-auto flex flex-wrap gap-2 content-start">
                        <template x-for="id in mySelectedItems">
                            <div class="w-12 h-12 bg-blue-500/20 rounded-lg border border-blue-500/30 flex items-center justify-center text-[10px] font-bold" x-text="getItem(id).name.substring(0,2)"></div>
                        </template>
                        <div x-show="mySelectedItems.length == 0" class="m-auto text-slate-700 text-sm italic">Add units from the list below...</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <label class="text-[10px] uppercase text-slate-500 font-bold">Gems 💎</label>
                            <input type="number" x-model.number="myGems" class="gem-input">
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] uppercase text-slate-500 font-bold">Total Value</div>
                            <div class="text-2xl font-black text-blue-400" x-text="Math.round(calculateTotal('my')).toLocaleString()"></div>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl side-their relative">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-red-500 font-black uppercase tracking-tighter">Their Offer</h2>
                        <button @click="resetSide('their')" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded hover:bg-red-600 hover:text-white transition-all uppercase font-bold">Clear</button>
                    </div>
                    
                    <div class="h-48 bg-black/40 rounded-2xl mb-6 border border-white/5 p-4 overflow-y-auto flex flex-wrap gap-2 content-start">
                        <template x-for="id in theirSelectedItems">
                            <div class="w-12 h-12 bg-red-500/20 rounded-lg border border-red-500/30 flex items-center justify-center text-[10px] font-bold" x-text="getItem(id).name.substring(0,2)"></div>
                        </template>
                        <div x-show="theirSelectedItems.length == 0" class="m-auto text-slate-700 text-sm italic">Add units from the list below...</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <label class="text-[10px] uppercase text-slate-500 font-bold">Gems 💎</label>
                            <input type="number" x-model.number="theirGems" class="gem-input focus:border-red-500">
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] uppercase text-slate-500 font-bold">Total Value</div>
                            <div class="text-2xl font-black text-red-500" x-text="Math.round(calculateTotal('their')).toLocaleString()"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl text-center mb-10 transition-all duration-500" :class="resultColor()">
                <div class="flex items-center justify-center gap-4 text-2xl font-black italic uppercase">
                    <span x-text="calculateTotal('my') + calculateTotal('their') == 0 ? '⚖️ Waiting...' : calculateDiff()"></span>
                </div>
            </div>

            <div class="mb-10">
                <input type="text" x-model="search" placeholder="Search units to add..." class="w-full p-4 glass rounded-xl outline-none focus:ring-2 focus:ring-blue-500 mb-6">
                <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3">
                    <template x-for="item in filteredItems()" :key="item.id">
                        <div class="glass p-3 rounded-xl border border-white/5 hover:border-white/20 transition-all">
                            <div class="text-[10px] font-bold text-slate-500 mb-1 truncate" x-text="item.name"></div>
                            <div class="flex gap-1">
                                <button @click="add('my', item.id)" class="flex-1 bg-blue-600 hover:bg-blue-400 py-1 rounded font-bold text-[10px] transition-colors uppercase">+ Me</button>
                                <button @click="add('their', item.id)" class="flex-1 bg-red-600 hover:bg-red-400 py-1 rounded font-bold text-[10px] transition-colors uppercase">+ Them</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="tab == 'values'" x-transition>
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-4xl font-black italic tracking-tighter">VALUE LIST</h1>
                <select x-model="multiplier" class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-bold">
                    <option value="1">STANDARD (1.0x)</option>
                    <option value="1.1">PARTNER (+10%)</option>
                    <option value="1.15">OFFICIAL PARTNER (+15%)</option>
                </select>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-4">
                <template x-for="item in items" :key="item.id">
                    <div class="glass p-4 rounded-2xl border-t-4" :class="'rarity-' + item.rarity">
                        <div class="w-full h-32 bg-black rounded-xl mb-3 flex items-center justify-center">
                            <img :src="item.img" x-show="item.img" class="w-full h-full object-contain p-2">
                            <span x-show="!item.img" class="text-slate-700 text-[10px] font-black uppercase">No Image</span>
                        </div>
                        <div class="font-bold text-sm truncate" x-text="item.name"></div>
                        <div class="text-green-400 font-black" x-text="Math.round(item.price * multiplier).toLocaleString() + ' 💎'"></div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="tab == 'staff'" x-transition>
            <h1 class="text-3xl font-black mb-10">STAFF & PARTNERS</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <template x-for="person in staff">
                    <div class="glass p-6 rounded-3xl flex items-center gap-4 border-l-4 border-blue-500">
                        <div class="w-12 h-12 bg-slate-800 rounded-full"></div>
                        <div>
                            <div class="font-bold" x-text="person.name"></div>
                            <div class="text-xs text-blue-400 uppercase font-black" x-text="person.role"></div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function portalApp() {
            return {
                tab: 'calc',
                multiplier: 1,
                search: '',
                myGems: 0,
                theirGems: 0,
                mySelectedItems: [], // Массив ID выбранных предметов
                theirSelectedItems: [],

                items: [
                    { id: 1, name: "Dark Essence", price: 15000, rarity: "legendary", img: "" },
                    { id: 2, name: "Cursed Eye", price: 4200, rarity: "epic", img: "" },
                    { id: 3, name: "Rusty Gear", price: 150, rarity: "common", img: "" },
                    { id: 4, name: "Blue Battery", price: 1200, rarity: "rare", img: "" },
                ],

                staff: [
                    { name: "SteelPaladin1", role: "Owner" },
                    { name: "LTTD Partner", role: "Partner (+15%)" },
                ],

                getItem(id) { return this.items.find(i => i.id == id); },
                
                filteredItems() {
                    return this.items.filter(i => i.name.toLowerCase().includes(this.search.toLowerCase()));
                },

                add(side, id) {
                    if(side == 'my') this.mySelectedItems.push(id);
                    else this.theirSelectedItems.push(id);
                },

                calculateTotal(side) {
                    let itemsSum = 0;
                    let ids = side == 'my' ? this.mySelectedItems : this.theirSelectedItems;
                    let gems = side == 'my' ? this.myGems : this.theirGems;
                    
                    ids.forEach(id => {
                        let item = this.getItem(id);
                        if(item) itemsSum += item.price;
                    });
                    
                    return (itemsSum + (gems || 0)) * this.multiplier;
                },

                calculateDiff() {
                    let my = this.calculateTotal('my');
                    let their = this.calculateTotal('their');
                    if(my == 0) return "Add your side...";
                    
                    let diff = their - my;
                    let percent = ((their / my) - 1) * 100;
                    
                    if (diff > 0) return "🏆 WIN (+" + Math.round(percent) + "%)";
                    if (diff === 0) return "⚖️ FAIR";
                    return "❌ LOSS (" + Math.round(percent) + "%)";
                },

                resultColor() {
                    let my = this.calculateTotal('my');
                    let their = this.calculateTotal('their');
                    if (my + their == 0) return "bg-black/40 text-slate-600 border-white/5";
                    let diff = their - my;
                    if (my == 0) return "bg-black/40 text-slate-500 border-white/5";
                    if (diff > 0) return "bg-green-500/10 text-green-500 border-green-500/50 shadow-lg shadow-green-500/20";
                    if (diff === 0) return "bg-yellow-500/10 text-yellow-500 border-yellow-500/50 shadow-lg shadow-yellow-500/20";
                    return "bg-red-500/10 text-red-500 border-red-500/50 shadow-lg shadow-red-500/20";
                },

                resetSide(side) {
                    if(side == 'my') { this.mySelectedItems = []; this.myGems = 0; }
                    else { this.theirSelectedItems = []; this.theirGems = 0; }
                }
            }
        }
    </script>
</body>
</html>
