<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Value List & Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body x-data="tradeApp()" class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">Item Value List ┆ Calculator</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
                <h2 class="text-xl mb-2">Вы даете (Your Side)</h2>
                <div class="text-4xl font-mono text-blue-400" x-text="myTotal + ' $' "></div>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
                <h2 class="text-xl mb-2">Они дают (Their Side)</h2>
                <div class="text-4xl font-mono text-purple-400" x-text="theirTotal + ' $' "></div>
            </div>
        </div>

        <div class="text-center mb-10 p-4 rounded-xl text-2xl font-bold" 
             :class="resultColor()" x-show="myTotal > 0 || theirTotal > 0">
            Результат: <span x-text="calculateDiff()"></span>
        </div>

        <h2 class="text-2xl mb-6">Выберите предметы:</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <template x-for="item in items" :key="item.id">
                <div class="glass p-4 rounded-xl hover:scale-105 transition-all cursor-pointer border hover:border-blue-500"
                     @click="addItem(item)">
                    <div class="w-full h-24 bg-slate-800 rounded-lg mb-2 flex items-center justify-center text-xs text-slate-500">IMAGE</div>
                    <div class="font-bold text-sm" x-text="item.name"></div>
                    <div class="text-green-400 text-sm" x-text="item.price + ' $'"></div>
                    
                    <div class="flex gap-2 mt-2">
                        <button @click.stop="myTotal += item.price" class="bg-blue-600 px-2 py-1 rounded text-[10px]">В Мои</button>
                        <button @click.stop="theirTotal += item.price" class="bg-purple-600 px-2 py-1 rounded text-[10px]">В Их</button>
                    </div>
                </div>
            </template>
        </div>

        <button @click="reset()" class="mt-10 text-slate-400 underline w-full text-center">Сбросить расчет</button>
    </div>

    <script>
        function tradeApp() {
            return {
                myTotal: 0,
                theirTotal: 0,
                items: [
                    { id: 1, name: "Член аптайма", price: 5000 },
                    { id: 2, name: "Ancient Coin", price: 1200 },
                    { id: 3, name: "Soul Key", price: 8500 },
                    { id: 4, name: "Rusty Sword", price: 150 },
                    { id: 5, name: "Magic Dust", price: 300 },
                    { id: 6, name: "Mega Potion", price: 2500 }
                ],
                calculateDiff() {
                    if (this.myTotal === 0) return "Жду предметов...";
                    let diff = this.theirTotal - this.myTotal;
                    if (diff > 0) return "ВЫГОДНО (Win) +" + diff;
                    if (diff === 0) return "РАВНО (Fair)";
                    return "УБЫТОК (Loss) " + diff;
                },
                resultColor() {
                    let diff = this.theirTotal - this.myTotal;
                    if (diff > 0) return "bg-green-900/50 text-green-400";
                    if (diff === 0) return "bg-yellow-900/50 text-yellow-400";
                    return "bg-red-900/50 text-red-400";
                },
                reset() {
                    this.myTotal = 0;
                    this.theirTotal = 0;
                }
            }
        }
    </script>
</body>
</html>
