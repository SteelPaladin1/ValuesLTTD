<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValuesLTTD ┆ Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { @apply px-4 py-2 rounded-xl transition-all font-bold text-sm uppercase tracking-wider; }
        .active-tab { @apply bg-blue-600 text-white shadow-lg shadow-blue-500/30; }
        .inactive-tab { @apply text-slate-400 hover:bg-slate-800; }
        /* Редкости */
        .rarity-common { border-top: 4px solid #94a3b8; }
        .rarity-rare { border-top: 4px solid #3b82f6; }
        .rarity-epic { border-top: 4px solid #a855f7; }
        .rarity-legendary { border-top: 4px solid #f59e0b; }
    </style>
</head>
<body x-data="portalApp()" class="pb-20">

    <nav class="sticky top-0 z-50 p-4 glass mb-8 border-b border-white/10">
        <div class="max-w-6xl mx-auto flex flex-wrap justify-center gap-2">
            <button @click="tab = 'values'" :class="tab == 'values' ? 'active-tab' : 'inactive-tab'" class="nav-btn">Value List</button>
            <button @click="tab = 'calc'" :class="tab == 'calc' ? 'active-tab' : 'inactive-tab'" class="nav-btn">Calculator</button>
            <button @click="tab = 'staff'" :class="tab == 'staff' ? 'active-tab' : 'inactive-tab'" class="nav-btn">Partners & Staff</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">

        <div x-show="tab == 'values'" x-transition>
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h1 class="text-3xl font-black">VALUE LIST</h1>
                
                <div class="glass p-2 rounded-2xl flex items-center gap-3">
                    <span class="text-xs font-bold text-slate-400 ml-2">МНОЖИТЕЛЬ:</span>
                    <select x-model="multiplier" class="bg-slate-900 border-none rounded-xl p-2 text-sm focus:ring-2 focus:ring-blue-500">
                        <option value="1">Стандарт (1.0x)</option>
                        <option value="1.1">Партнер (+10%)</option>
                        <option value="1.15">Партнер (+15%)</option>
                        <option value="1.25">VIP (+25%)</option>
                    </select>
                </div>
            </div>

            <input type="text" x-model="search" placeholder="Поиск предмета..." class="w-full p-4 glass rounded-2xl mb-8 outline-none focus:ring-2 focus:ring-blue-500">

            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                <template x-for="item in filteredItems()" :key="item.id">
                    <div class="glass p-4 rounded-2xl relative group" :class="'rarity-' + item.rarity">
                        <div class="w-full h-32 bg-slate-800/50 rounded-xl mb-3 flex items-center justify-center overflow-hidden">
                            <img :src="item.img" x-show="item.img" class="w-full h-full object-contain p-2">
                            <span x-show="!item.img" class="text-slate-600 font-bold text-xs">NO IMG</span>
                        </div>
                        <h3 class="font-bold mb-1" x-text="item.name"></h3>
                        <div class="text-green-400 font-mono font-bold" x-text="Math.round(item.price * multiplier).toLocaleString() + ' $'"></div>
                        <div class="text-[10px] uppercase opacity-40 mt-1" x-text="item.rarity"></div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="tab == 'calc'" x-transition>
            <h1 class="text-3xl font-black mb-8 text-center">TRADE CALCULATOR</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="glass p-6 rounded-3xl border-l-8 border-blue-500">
                    <h2 class="text-blue-400 font-bold mb-2">YOU SEND</h2>
                    <div class="text-4xl font-black" x-text="Math.round(myTotal * multiplier).toLocaleString() + ' $'"></div>
                    <button @click="myTotal = 0" class="mt-4 text-xs text-slate-500 underline">Очистить</button>
                </div>
                <div class="glass p-6 rounded-3xl border-l-8 border-purple-500">
                    <h2 class="text-purple-400 font-bold mb-2">THEY SEND</h2>
                    <div class="text-4xl font-black" x-text="Math.round(theirTotal * multiplier).toLocaleString() + ' $'"></div>
                    <button @click="theirTotal = 0" class="mt-4 text-xs text-slate-500 underline">Очистить</button>
                </div>
            </div>

            <div x-show="myTotal > 0 || theirTotal > 0" class="p-6 rounded-2xl mb-8 text-center text-xl font-bold glass border-2" :class="resultColor()">
                <span x-text="calculateDiff()"></span>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3">
                <template x-for="item in items" :key="item.id">
                    <div class="glass p-3 rounded-xl text-center">
                        <div class="font-bold text-xs mb-2 text-slate-300" x-text="item.name"></div>
                        <div class="flex gap-1">
                            <button @click="myTotal += item.price" class="flex-1 bg-blue-600 py-1 rounded text-[10px] font-bold">В Мои</button>
                            <button @click="theirTotal += item.price" class="flex-1 bg-purple-600 py-1 rounded text-[10px] font-bold">В Их</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="tab == 'staff'" x-transition>
            <h2 class="text-2xl font-black mb-6 text-blue-400">ADMINISTRATION</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mb-12">
                <template x-for="person in staff" :key="person.name">
                    <div class="glass p-6 rounded-3xl border-b-4 border-blue-500 flex items-center gap-4">
                        <div class="w-16 h-16 rounded-full bg-slate-800 overflow-hidden flex-shrink-0">
                            <img :src="person.avatar" x-show="person.avatar" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <div class="font-bold text-lg" x-text="person.name"></div>
                            <div class="text-blue-400 text-xs font-bold uppercase" x-text="person.role"></div>
                        </div>
                    </div>
                </template>
            </div>

            <h2 class="text-2xl font-black mb-6 text-purple-400">OFFICIAL PARTNERS</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <template x-for="partner in partners" :key="partner.name">
                    <div class="glass p-6 rounded-3xl border-b-4 border-purple-500">
                        <div class="font-bold text-xl mb-1" x-text="partner.name"></div>
                        <div class="text-purple-400 text-xs mb-3 font-bold" x-text="'Value: ' + partner.bonus"></div>
                        <p class="text-slate-400 text-sm" x-text="partner.desc"></p>
                    </div>
                </template>
            </div>
        </div>

    </div>

    <script>
        function portalApp() {
            return {
                tab: 'values',
                search: '',
                multiplier: 1,
                myTotal: 0,
                theirTotal: 0,

                // 1. СПИСОК ПРЕДМЕТОВ
                items: [
                    { id: 1, name: "Dark Essence", price: 15000, rarity: "legendary", img: "" },
                    { id: 2, name: "Cursed Eye", price: 4200, rarity: "epic", img: "" },
                    { id: 3, name: "Rusty Gear", price: 150, rarity: "common", img: "" },
                ],

                // 2. СПИСОК АДМИНИСТРАЦИИ
                staff: [
                    { name: "OwnerName", role: "Founder", avatar: "" },
                    { name: "Admin_1", role: "Manager", avatar: "" },
                ],

                // 3. СПИСОК ПАРТНЕРОВ
                partners: [
                    { name: "SuperTrader YT", bonus: "+15%", desc: "Famous Roblox content creator." },
                    { name: "LTTD Group", bonus: "+10%", desc: "Official trading hub partner." },
                ],

                filteredItems() {
                    return this.items.filter(i => i.name.toLowerCase().includes(this.search.toLowerCase()));
                },

                calculateDiff() {
                    let myM = this.myTotal * this.multiplier;
                    let theirM = this.theirTotal * this.multiplier;
                    if (myM === 0) return "Add your items";
                    let diff = theirM - myM;
                    if (diff > 0) return "WIN (Выгодно) +" + Math.round(diff).toLocaleString() + " $";
                    if (diff === 0) return "FAIR (Равно)";
                    return "LOSS (Убыток) " + Math.round(diff).toLocaleString() + " $";
                },

                resultColor() {
                    let diff = (this.theirTotal * this.multiplier) - (this.myTotal * this.multiplier);
                    if (this.myTotal === 0) return "border-slate-700 text-slate-500";
                    if (diff > 0) return "border-green-500 text-green-400 bg-green-500/10";
                    if (diff === 0) return "border-yellow-500 text-yellow-400 bg-yellow-500/10";
                    return "border-red-500 text-red-400 bg-red-500/10";
                }
            }
        }
    </script>
</body>
</html>
