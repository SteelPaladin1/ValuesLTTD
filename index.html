<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValuesLTTD ┆ Ultimate Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #020617; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* Эффект стекла для фонов */
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }

        /* БАЗОВЫЙ СТИЛЬ КНОПОК НАВИГАЦИИ (Прямоугольные, как ты хотел) */
        .nav-btn { 
            @apply px-8 py-4 rounded-none transition-all duration-300 font-extrabold text-sm uppercase tracking-wider relative border-2;
            box-shadow: 0 0 5px rgba(255,255,255,0.05);
        }

        /* НЕАКТИВНАЯ КНОПКА (Тусклая, но с контуром) */
        .tab-inactive { 
            @apply border-slate-700 text-slate-500 hover:border-slate-500 hover:text-slate-300 bg-slate-950/50; 
        }

        /* --- НЕОНОВЫЕ СТИЛИ ДЛЯ АКТИВНЫХ КНОПОК --- */
        
        /* 1. СИНИЙ НЕОН (Value List) */
        .tab-active-blue { 
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            color: #38bdf8;
            text-shadow: 0 0 8px #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5), inset 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* 2. ФИОЛЕТОВЫЙ НЕОН (Calculator) */
        .tab-active-purple { 
            background: rgba(168, 85, 247, 0.1);
            border-color: #a855f7;
            color: #a855f7;
            text-shadow: 0 0 8px #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5), inset 0 0 10px rgba(168, 85, 247, 0.3);
        }

        /* 3. ЗЕЛЕНЫЙ НЕОН (Staff) */
        .tab-active-green { 
            background: rgba(74, 222, 128, 0.1);
            border-color: #4ade80;
            color: #4ade80;
            text-shadow: 0 0 8px #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5), inset 0 0 10px rgba(74, 222, 128, 0.3);
        }

        /* ПОЛУКРУГЛЫЕ НЕОНОВЫЕ КНОПКИ (как в "Rarity Page") */
        .rarity-pill-btn { @apply px-6 py-2 rounded-full font-black text-xs uppercase tracking-tighter border-2 bg-slate-950 transition-all hover:scale-105; }
        
        /* Конкретные цвета редкостей (из image_7 и image_8) */
        .rarity-common { border-color: #94a3b8; color: #94a3b8; }
        .rarity-uncommon { border-color: #4ade80; color: #4ade80; }
        .rarity-rare { border-color: #3b82f6; color: #3b82f6; }
        .rarity-epic { border-color: #a855f7; color: #a855f7; }
        .rarity-legendary { border-color: #f59e0b; color: #f59e0b; }
        .rarity-mythic { border-color: #ef4444; color: #ef4444; }
        .rarity-exclusive { border-color: #22d3ee; color: #22d3ee; }

        /* Карточка юнита (из image_8) */
        .unit-card { @apply border border-white/10 glass p-5 rounded-2xl relative transition-all duration-300 hover:border-white hover:-translate-y-1; }
        .unit-card.selected-rarity { @apply border-t-8; }

        /* Стиль бриллиантов (из image_8 - image_9) */
        .diamond-wrap { @apply flex items-center justify-center gap-4 text-3xl; }
        .diamond-icon { color: #38bdf8; text-shadow: 0 0 8px #38bdf8; }
    </style>
</head>
<body x-data="portalApp()" class="pb-20">

    <nav class="sticky top-0 z-50 mb-12 border-b border-slate-800 bg-slate-950/80 backdrop-blur-lg shadow-[0_0_15px_rgba(0,0,0,0.5)]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-stretch">
            
            <div class="flex items-center justify-center p-4 border-b md:border-b-0 md:border-r border-slate-800">
                <span class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                    VALUES LTTD
                </span>
            </div>

            <div class="flex flex-col sm:flex-row flex-grow">
                <button @click="tab = 'main'" 
                        class="nav-btn flex-grow"
                        :class="tab == 'main' ? 'tab-active-blue' : 'tab-inactive'">
                    Main Page
                </button>
                <button @click="tab = 'calc'" 
                        class="nav-btn flex-grow border-t-0 sm:border-t-2 sm:border-l-0"
                        :class="tab == 'calc' ? 'tab-active-purple' : 'tab-inactive'">
                    Trade Checker
                </button>
                <button @click="tab = 'staff'" 
                        class="nav-btn flex-grow border-t-0 sm:border-t-2 sm:border-l-0"
                        :class="tab == 'staff' ? 'tab-active-green' : 'tab-inactive'">
                    Partners & Staff
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4">

        <div x-show="tab == 'main'" x-transition>
            
            <header class="text-center mb-16 relative">
                <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl"></div>
                <h1 class="text-6xl font-black italic uppercase tracking-tighter mb-1 relative z-10">
                    Units 
                    <span class="text-slate-600">R</span><span class="text-green-500">a</span><span class="text-blue-500">r</span><span class="text-yellow-500">i</span><span class="text-red-500">t</span><span class="text-white">y</span> 
                    Page
                </h1>
                <p class="text-xs uppercase font-bold text-slate-600 tracking-widest">Select rarity to view values:</p>
            </header>

            <div class="flex flex-wrap justify-center gap-2 mb-16 max-w-4xl mx-auto">
                <button @click="setRarity('all')" 
                        class="rarity-pill-btn"
                        :class="rarityFilter === 'all' ? 'border-white text-white' : 'border-white/10 text-slate-600'">
                    All
                </button>
                <button @click="setRarity('uncommon')" class="rarity-pill-btn rarity-uncommon" :class="rarityFilter === 'uncommon' && 'bg-white text-black border-white shadow-lg'">Uncommon</button>
                <button @click="setRarity('rare')" class="rarity-pill-btn rarity-rare" :class="rarityFilter === 'rare' && 'bg-white text-black border-white shadow-lg'">Rare</button>
                <button @click="setRarity('epic')" class="rarity-pill-btn rarity-epic" :class="rarityFilter === 'epic' && 'bg-white text-black border-white shadow-lg'">Epic</button>
                <button @click="setRarity('legendary')" class="rarity-pill-btn rarity-legendary" :class="rarityFilter === 'legendary' && 'bg-white text-black border-white shadow-lg'">Legendary</button>
                <button @click="setRarity('mythic')" class="rarity-pill-btn rarity-mythic" :class="rarityFilter === 'mythic' && 'bg-white text-black border-white shadow-lg'">Mythic</button>
                <button @click="setRarity('exclusive')" class="rarity-pill-btn rarity-exclusive" :class="rarityFilter === 'exclusive' && 'bg-white text-black border-white shadow-lg'">Exclusive</button>
                
                <button class="rarity-pill-btn border-green-500 text-green-500 hover:bg-green-600 hover:text-white hover:border-green-600">Crates</button>
            </div>

            <div class="diamond-wrap mb-10 text-transparent bg-clip-text bg-gradient-to-r" :class="getRarityColorClass(rarityFilter, 'gradient')">
                <span class="diamond-icon">💎</span>
                <h2 class="text-4xl font-black uppercase italic tracking-widest" x-text="getRarityTitle(rarityFilter)"></h2>
                <span class="diamond-icon">💎</span>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
                <template x-for="item in filteredItems()" :key="item.id">
                    <div class="unit-card" :class="rarityFilter !== 'all' && getRarityCardClass(item.rarity)">
                        <div class="w-full h-32 bg-slate-950 rounded-xl mb-4 flex items-center justify-center overflow-hidden border border-slate-800 shadow-inner p-2 relative">
                            <img :src="item.img" x-show="item.img" class="max-w-full max-h-full object-contain">
                            <span x-show="!item.img" class="text-slate-700 font-black text-xs">NO DATA</span>
                            
                            <div class="absolute bottom-2 left-2 bg-black/80 px-3 py-1 rounded-xl font-black text-2xl border border-white/10 italic">
                                $<span x-text="item.price.toLocaleString()"></span>
                            </div>
                        </div>

                        <h3 class="font-bold mb-3 transition-colors uppercase italic tracking-tight" :class="getRarityCardClass(item.rarity, 'text')" x-text="item.name"></h3>
                        
                        <div class="glass p-4 rounded-xl space-y-2 text-[10px] font-black uppercase tracking-widest shadow-inner border border-white/5">
                            <div class="flex justify-between border-b border-white/5 pb-1"><span class="opacity-40">Value:</span><span x-text="item.value_points"></span></div>
                            <div class="flex justify-between border-b border-white/5 pb-1"><span class="opacity-40">Demand:</span><span x-text="item.demand"></span></div>
                            <div class="flex justify-between"><span class="opacity-40">Status:</span><span x-text="item.status"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="mt-24 max-w-4xl mx-auto text-left glass p-10 rounded-[30px] border border-slate-800">
                <h2 class="text-5xl font-black mb-10 uppercase italic tracking-tighter flex items-center gap-4">
                    <span class="text-slate-600">🔗 Community</span> Links <span class="text-slate-600">💬</span>
                </h2>
                <div class="space-y-6">
                    <div class="flex items-center gap-5 group">
                        <div class="w-16 h-16 bg-red-600/10 rounded-2xl flex items-center justify-center text-4xl group-hover:bg-red-600/30 transition-all">🎮</div>
                        <div>
                            <span class="text-xl font-bold text-red-600 uppercase">Game:</span> 
                            <a href="https://www.roblox.com/games/94229247275433/Legacy-Toilet-Tower-Defense" target="_blank" class="text-xl font-bold hover:text-blue-400 transition-colors underline decoration-slate-800">www.roblox.com/games/94229247275433/...</a>
                        </div>
                    </div>
                    <div class="flex items-center gap-5 group">
                        <div class="w-16 h-16 bg-blue-600/10 rounded-2xl flex items-center justify-center text-4xl group-hover:bg-blue-600/30 transition-all">📢</div>
                        <div>
                            <span class="text-xl font-bold text-blue-600 uppercase">Discord Channel:</span> 
                            <a href="https://discord.gg/6wCjwJnc" target="_blank" class="text-xl font-bold hover:text-blue-400 transition-colors underline decoration-slate-800">discord.gg/6wCjwJnc</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="tab == 'calc'" x-transition>
            <h1 class="text-center text-4xl font-black mb-10 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">TRADE CHECKER</h1>
            <p class="text-center text-slate-700 italic">Calculator code from your old file goes here...</p>
        </div>

        <div x-show="tab == 'staff'" x-transition>
            <h1 class="text-center text-4xl font-black mb-10 text-green-400 border-l-8 border-green-500 pl-4 uppercase tracking-tighter">HQ</h1>
            <p class="text-center text-slate-700 italic">Staff code from your old file goes here...</p>
        </div>

    </div>

    <button x-show="tab == 'calc' && (myTotal > 0 || theirTotal > 0)" 
            @click="reset()" 
            x-transition 
            class="fixed bottom-6 right-6 p-4 rounded-full glass border-2 border-red-500/50 text-red-400 hover:bg-red-600 hover:text-white shadow-lg shadow-red-500/20 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H4z"/></svg>
    </button>

    <script>
        function portalApp() {
            return {
                tab: 'main', // Какая вкладка открыта при старте
                rarityFilter: 'all', // Фильтр редкости по умолчанию
                search: '',
                multiplier: 1, // Текущий множитель цены
                myTotal: 0,    // Сумма твоих предметов
                theirTotal: 0, // Сумма их предметов

                // =============================================
                // 1. ДАННЫЕ: СПИСОК ПРЕДМЕТОВ (на основе image_8)
                // Редкости: uncommon, rare, epic, legendary, mythic, exclusive
                // =============================================
                items: [
                    { id: 1, name: "Cameraman", price: 100, value_points: 1, demand: 0, status: "1/10", rarity: "uncommon", img: "" },
                    { id: 2, name: "Clover Speakerman", price: 177, value_points: 10, demand: 2, status: "1/10", rarity: "uncommon", img: "" },
                    { id: 3, name: "Epic Unit 1", price: 4200, value_points: 150, demand: 6, status: "3/10", rarity: "epic", img: "" },
                    { id: 4, name: "Mythic Clock", price: 50000, value_points: 2000, demand: 10, status: "10/10", rarity: "mythic", img: "" },
                    { id: 5, name: "Legendary Dragon", price: 15000, value_points: 500, demand: 8, status: "5/10", rarity: "legendary", img: "" },
                ],

                // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---

                // Фильтрация списка предметов (для поиска)
                filteredItems() {
                    return this.items.filter(i => {
                        const matchRarity = this.rarityFilter === 'all' || i.rarity === this.rarityFilter;
                        const matchSearch = i.name.toLowerCase().includes(this.search.toLowerCase());
                        return matchRarity && matchSearch;
                    });
                },

                // Установка фильтра редкости
                setRarity(rarity) {
                    this.rarityFilter = rarity;
                },

                // Получение заголовка для текущей редкости
                getRarityTitle(rarity) {
                    if (rarity === 'all') return 'All Values';
                    return rarity.charAt(0).toUpperCase() + rarity.slice(1) + ' Value';
                },

                // Получение CSS классов для заголовка и карточек
                getRarityColorClass(rarity, type) {
                    const rarityColors = {
                        all: { gradient: 'from-slate-600 to-white', text: 'text-white', card: 'border-white' },
                        uncommon: { gradient: 'from-green-600 to-green-300', text: 'text-green-400', card: 'border-green-500' },
                        rare: { gradient: 'from-blue-600 to-blue-300', text: 'text-blue-400', card: 'border-blue-500' },
                        epic: { gradient: 'from-purple-600 to-purple-300', text: 'text-purple- Purple-400', card: 'border-purple-500' },
                        legendary: { gradient: 'from-orange-600 to-orange-300', text: 'text-orange-400', card: 'border-orange-500' },
                        mythic: { gradient: 'from-red-600 to-red-300', text: 'text-red-400', card: 'border-red-500' },
                        exclusive: { gradient: 'from-cyan-600 to-cyan-300', text: 'text-cyan-400', card: 'border-cyan-400' }
                    };
                    return rarityColors[rarity] ? rarityColors[rarity][type] : rarityColors['all'][type];
                },

                getRarityCardClass(itemRarity, type = 'card') {
                    // Используем общий стиль для редкостей
                    const rarityColors = {
                        uncommon: { text: 'text-green-400', card: 'border-green-500Selected' },
                        rare: { text: 'text-blue-400', card: 'border-blue-500Selected' },
                        epic: { text: 'text-purple-400', card: 'border-purple-500Selected' },
                        legendary: { text: 'text-orange-400', card: 'border-orange-500Selected' },
                        mythic: { text: 'text-red-400', card: 'border-red-500Selected' },
                        exclusive: { text: 'text-cyan-400', card: 'border-cyan-400Selected' }
                    };
                    
                    if (type === 'text') {
                        return rarityColors[itemRarity] ? rarityColors[itemRarity]['text'] : 'text-white';
                    }
                    
                    // Для карточек добавляем класс "Selected", чтобы применить стили редкости
                    return rarityColors[itemRarity] ? `unit-card ${rarityColors[itemRarity]['card']}` : 'unit-card';
                },

                // (Вспомогательные функции для калькулятора - тут оставь свои старые расчеты)
                // Расчет результата сделки
                calculateDiff() {
                    // ... твой старый код расчетов ...
                    return ""; // Заглушка
                },
                resultColor() {
                    // ... твой старый код расчетов ...
                    return ""; // Заглушка
                },
                reset() {
                    this.myTotal = 0;
                    this.theirTotal = 0;
                }
            }
        }
    </script>
</body>
</html>
