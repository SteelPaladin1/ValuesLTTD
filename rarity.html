<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>LTTD ┆ Units Rarity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; }
        .nav-container { @apply flex w-full border-b border-white/10 bg-black/80 backdrop-blur-md sticky top-0 z-50; }
        .nav-item { @apply flex-1 py-5 text-center font-black text-[11px] uppercase tracking-tighter transition-all duration-300 border-r border-white/5; border-bottom: 4px solid transparent; }
        .n-cyan { color: #22d3ee; } .n-cyan.active, .n-cyan:hover { border-bottom-color: #22d3ee; background: rgba(34, 211, 238, 0.15); box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.2); text-shadow: 0 0 10px #22d3ee; color: white; }
        .pill-btn { @apply px-6 py-2 rounded-full border-2 font-black text-[10px] uppercase transition-all bg-slate-950; }
        .rarity-uncommon { border-color: #4ade80; color: #4ade80; }
        .rarity-mythic { border-color: #ef4444; color: #ef4444; }
    </style>
</head>
<body x-data="unitApp()">
    <nav class="nav-container">
        <a href="index.html" class="nav-item text-[#38bdf8]">Main</a>
        <a href="rarity.html" class="nav-item n-cyan active">Units</a>
        <a href="calculator.html" class="nav-item text-[#a855f7]">Calc</a>
        <a href="signs.html" class="nav-item text-[#ef4444]">Signs</a>
        <a href="codes.html" class="nav-item text-[#4ade80]">Codes</a>
        <a href="updates.html" class="nav-item text-[#f59e0b]">Updates</a>
    </nav>
    <div class="max-w-7xl mx-auto py-10 px-4 text-center">
        <h1 class="text-6xl font-black italic uppercase mb-10">Units <span class="text-slate-600">R</span><span class="text-green-500">a</span><span class="text-blue-500">r</span><span class="text-yellow-500">i</span><span class="text-red-500">t</span><span class="text-white">y</span> Page</h1>
        <div class="flex flex-wrap justify-center gap-3 mb-16">
            <button @click="filter = 'all'" class="pill-btn border-white/20" :class="filter == 'all' && 'bg-white text-black border-white'">All</button>
            <button @click="filter = 'uncommon'" class="pill-btn rarity-uncommon" :class="filter == 'uncommon' && 'bg-green-500 text-white'">Uncommon</button>
            <button @click="filter = 'mythic'" class="pill-btn rarity-mythic" :class="filter == 'mythic' && 'bg-red-500 text-white'">Mythic</button>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <template x-for="item in items.filter(i => filter == 'all' || i.rarity == filter)">
                <div class="bg-slate-900/50 p-4 rounded-3xl border-b-4 border-slate-700">
                    <div class="aspect-square bg-black rounded-2xl mb-4 overflow-hidden relative">
                        <img :src="item.img" x-show="item.img" class="w-full h-full object-cover">
                        <div class="absolute bottom-2 left-2 bg-black/80 px-2 py-1 rounded font-black italic" x-text="'$' + item.price"></div>
                    </div>
                    <h3 class="font-black italic uppercase mb-2" x-text="item.name"></h3>
                    <div class="text-[10px] space-y-1 opacity-60 font-bold uppercase tracking-widest text-left">
                        <div class="flex justify-between"><span>Value:</span><span x-text="item.value"></span></div>
                        <div class="flex justify-between"><span>Demand:</span><span x-text="item.demand"></span></div>
                        <div class="flex justify-between"><span>Status:</span><span x-text="item.status"></span></div>
                    </div>
                </div>
            </template>
        </div>
    </div>
    <script>
        function unitApp() {
            return {
                filter: 'all',
                items: [
                    { id: 1, name: "Cameraman", price: 100, value: 1, demand: 0, status: "1/10", rarity: "uncommon", img: "" },
                    { id: 2, name: "Mythic Clock", price: 50000, value: 2000, demand: 10, status: "10/10", rarity: "mythic", img: "" }
                ]
            }
        }
    </script>
</body>
</html>
