<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LTTD ┆ Rarity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        .nav-container { @apply flex w-full border-b border-white/10 bg-black/80 backdrop-blur-md sticky top-0 z-50; }
        .nav-item { @apply flex-1 py-5 text-center font-black text-[11px] uppercase tracking-tighter transition-all duration-300 border-r border-white/5; border-bottom: 4px solid transparent; }
        .n-blue { color: #38bdf8; } .n-blue:hover { border-bottom-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .n-cyan { color: #22d3ee; } .n-cyan.active, .n-cyan:hover { border-bottom-color: #22d3ee; background: rgba(34, 211, 238, 0.15); box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.2); text-shadow: 0 0 10px #22d3ee; color: white; }
        .n-purple { color: #a855f7; } .n-purple:hover { border-bottom-color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .n-red { color: #ef4444; } .n-red:hover { border-bottom-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .n-green { color: #4ade80; } .n-green:hover { border-bottom-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .n-orange { color: #f59e0b; } .n-orange:hover { border-bottom-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .pill-btn { @apply px-6 py-2 rounded-full border-2 font-black text-[10px] uppercase transition-all bg-slate-950; }
    </style>
</head>
<body x-data="{ rarity: 'uncommon' }">
    <nav class="nav-container">
        <a href="index.html" class="nav-item n-blue">Main</a>
        <a href="rarity.html" class="nav-item n-cyan active">Units</a>
        <a href="calculator.html" class="nav-item n-purple">Calc</a>
        <a href="signs.html" class="nav-item n-red">Signs</a>
        <a href="codes.html" class="nav-item n-green">Codes</a>
        <a href="updates.html" class="nav-item n-orange">Updates</a>
    </nav>
    <div class="max-w-6xl mx-auto py-10 px-4 text-center">
        <h1 class="text-6xl font-black italic uppercase mb-10">Units <span class="text-slate-600">R</span><span class="text-green-500">a</span><span class="text-blue-500">r</span><span class="text-yellow-500">i</span><span class="text-red-500">t</span><span class="text-white">y</span> Page</h1>
        <div class="flex flex-wrap justify-center gap-3 mb-16">
            <button @click="rarity = 'uncommon'" class="pill-btn border-green-500 text-green-500" :class="rarity == 'uncommon' && 'bg-white text-black'">Uncommon</button>
            <button @click="rarity = 'rare'" class="pill-btn border-blue-500 text-blue-500" :class="rarity == 'rare' && 'bg-white text-black'">Rare</button>
            <button @click="rarity = 'mythic'" class="pill-btn border-red-500 text-red-500" :class="rarity == 'mythic' && 'bg-white text-black'">Mythic</button>
            <button class="pill-btn border-emerald-500 text-emerald-500 shadow-lg">Crates</button>
        </div>
        <div class="text-4xl font-black italic uppercase text-cyan-400 mb-10">💎 <span x-text="rarity"></span> Value 💎</div>
        </div>
</body>
</html>
